<!doctype html>
<html lang="en">
  <head>
    <title>Document</title>
    <link rel="stylesheet" href="styles/style.css" />
    <script src="scripts/quiz.js"></script>
  </head>
  <body>
    <header>
      <h1>QUIZ APP</h1>
    </header>
    <main>
      <section>
        <div class="quiz-container">
          <form action="">
            <legend>1. What is the capital of India?</legend>
            <fieldset>
              <div class="options">
                <input type="radio" name="options" id="Delhi" />
                <label for="Delhi">Delhi</label>
              </div>
              <div class="options">
                <input type="radio" name="options" id="Tokyo" />
                <label for="Tokyo">Tokyo</label>
              </div>
              <div class="options">
                <input type="radio" name="options" id="Cairo" />
                <label for="Cairo">Cairo</label>
              </div>
            </fieldset>
            <button type="submit">Next</button>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
